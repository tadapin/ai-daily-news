<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily AI News</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --text: #e8eaf0;
      --text-muted: #8b90a8;
      --accent: #6c63ff;
      --radius: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.7;
      min-height: 100vh;
    }
    .site-header {
      background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 28px 40px;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
    }
    .site-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .site-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 40px;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .archive-list {
      display: grid;
      gap: 12px;
    }
    .archive-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 24px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .archive-item:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,99,255,0.12);
    }
    .archive-item.latest {
      border-color: var(--accent);
      background: linear-gradient(135deg, #1a1d27, #1e1b3a);
    }
    .archive-date {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .archive-badge {
      font-size: 0.75rem;
      background: var(--accent);
      color: white;
      padding: 3px 12px;
      border-radius: 20px;
      font-weight: 600;
    }
    .archive-arrow {
      color: var(--text-muted);
      font-size: 1.2rem;
    }
    .footer {
      border-top: 1px solid var(--border);
      padding: 24px 40px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      background: var(--surface);
      margin-top: 60px;
    }
    .footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="site-title">⚡ Daily AI News</div>
      <div class="site-desc">43本のRSSフィードから毎朝自動収集・AIサマリーしたAIニュース一覧</div>
    </div>
  </header>

  <main class="main">
    <div class="section-title">アーカイブ</div>
    <div class="archive-list" id="archiveList">
      <!-- JSで動的生成 -->
    </div>
  </main>

  <footer class="footer">
    情報源: <a href="https://github.com/Olshansk/rss-feeds" target="_blank">Olshansk/rss-feeds</a> および各公式RSSフィード &nbsp;|&nbsp;
    サマリーはAIにより自動生成されています
  </footer>

  <script>
    // archive-index.jsonからアーカイブ一覧を読み込む
    fetch('archive-index.json')
      .then(r => r.json())
      .then(dates => {
        const list = document.getElementById('archiveList');
        if (!dates || dates.length === 0) {
          list.innerHTML = '<p style="color:var(--text-muted)">記事がまだありません。</p>';
          return;
        }
        // 新しい順にソート
        dates.sort((a, b) => b.localeCompare(a));
        dates.forEach((date, i) => {
          const a = document.createElement('a');
          a.href = date + '.html';
          a.className = 'archive-item' + (i === 0 ? ' latest' : '');
          // YYYY-MM-DD → YYYY年MM月DD日
          const parts = date.split('-');
          const label = parts[0] + '年' + parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日';
          a.innerHTML = `
            <span class="archive-date">📅 ${label}</span>
            <span style="display:flex;align-items:center;gap:12px">
              ${i === 0 ? '<span class="archive-badge">最新</span>' : ''}
              <span class="archive-arrow">→</span>
            </span>
          `;
          list.appendChild(a);
        });
      })
      .catch(() => {
        document.getElementById('archiveList').innerHTML = '<p style="color:var(--text-muted)">アーカイブの読み込みに失敗しました。</p>';
      });
  </script>
</body>
</html>
